        x: 0,

    };
    nodes.push(nd);
    nodeMap[id] = nd;
    return nd;
}

function layoutNodes() {
    var colGroups = {};
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (!colGroups[n.col]) colGroups[n.col] = [];
        colGroups[n.col].push(n);
    }
    for (var c in colGroups) {
        var group = colGroups[c];
        group.sort(function(a, b) { return a.row - b.row; });
        var totalH = group.length * VERT_GAP;
        var startY = -totalH / 2 + VERT_GAP / 2;
        for (var i = 0; i < group.length; i++) {
            var n = group[i];
            n.x = COL_X[n.col] + n.indent * 30;
            n.y = startY + i * VERT_GAP;
        }
    }
}

function measureNodes() {
    ctx.save();
    ctx.font = "bold 12px 'Segoe UI',sans-serif";
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var lines = n.label.split("\n");
        var maxW = 0;
        for (var j = 0; j < lines.length; j++) {
            var m = ctx.measureText(lines[j]).width;
            if (m > maxW) maxW = m;
        }
        n.w = Math.max(maxW + 28, 80);
        n.h = Math.max(lines.length * 18 + 16, 36);
        n.lines = lines;
    }
    ctx.restore();
}

function screenToWorld(sx, sy) {
    return {
        x: (sx - W / 2) / camZ + W / 2 - camX,
        y: (sy - H / 2) / camZ + H / 2 - camY
    };
}

function worldToScreen(wx, wy) {
    return {
        x: (wx - W / 2 + camX) * camZ + W / 2,
        y: (wy - H / 2 + camY) * camZ + H / 2
    };
}

function hitTestNode(wx, wy) {
    for (var i = nodes.length - 1; i >= 0; i--) {
        var n = nodes[i];
        if (wx >= n.x - n.w / 2 && wx <= n.x + n.w / 2 && wy >= n.y - n.h / 2 && wy <= n.y + n.h / 2) {
            return n;
        }
    }
    return null;
}

function distToSegment(px, py, ax, ay, bx, by) {
    var dx = bx - ax, dy = by - ay;
    var lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return Math.sqrt((px - ax) * (px - ax) + (py - ay) * (py - ay));
    var t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    var cx = ax + t * dx, cy = ay + t * dy;
    return Math.sqrt((px - cx) * (px - cx) + (py - cy) * (py - cy));
}

function hitTestLink(wx, wy) {
    var best = null, bestD = 12 / camZ;
    for (var i = 0; i < allLinks.length; i++) {
        var l = allLinks[i];
        var sx = l.source.x + l.source.w / 2;
        var sy = l.source.y;
        var tx = l.target.x - l.target.w / 2;
        var ty = l.target.y;
        if (l.source.col === l.target.col) {
            sx = l.source.x;
            sy = l.source.y + l.source.h / 2;
            tx = l.target.x;
            ty = l.target.y - l.target.h / 2;
        }
        var d = distToSegment(wx, wy, sx, sy, tx, ty);
        if (d < bestD) { bestD = d; best = l; }
    }
    return best;
}

function hexToRgba(hex, a) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
}

function drawRoundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawArrowhead(x, y, angle, size) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - size * Math.cos(angle - 0.35), y - size * Math.sin(angle - 0.35));
    ctx.lineTo(x - size * Math.cos(angle + 0.35), y - size * Math.sin(angle + 0.35));
    ctx.closePath();
    ctx.fill();
}

function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(camZ, camZ);
    ctx.translate(-W / 2 + camX, -H / 2 + camY);

    var connectedSet = {};
    if (selectedNode) {
        connectedSet[selectedNode.id] = true;
        for (var i = 0; i < allLinks.length; i++) {
            var l = allLinks[i];
            if (l.source === selectedNode) connectedSet[l.target.id] = true;
            if (l.target === selectedNode) connectedSet[l.source.id] = true;
        }
    }

    drawTransitionLabels();

    for (var i = 0; i < allLinks.length; i++) {
        var l = allLinks[i];
        if (l.kind === "cross") continue;
        drawLink(l, connectedSet);
    }

    for (var i = 0; i < allLinks.length; i++) {
        var l = allLinks[i];
        if (l.kind !== "cross") continue;
        drawLink(l, connectedSet);
    }

    for (var i = 0; i < nodes.length; i++) {
        drawNode(nodes[i], connectedSet);
    }

    ctx.restore();
}

function drawTransitionLabels() {
    ctx.save();
    ctx.font = "italic 10px 'Segoe UI',sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for (var i = 0; i < transitionLabels.length; i++) {
        var tl = transitionLabels[i];
        var x1 = COL_X[tl.fromCol];
        var x2 = COL_X[tl.toCol];
        var midX = (x1 + x2) / 2;

        var fromGroup = [];
        var toGroup = [];
        for (var j = 0; j < nodes.length; j++) {
            if (nodes[j].col === tl.fromCol) fromGroup.push(nodes[j]);
            if (nodes[j].col === tl.toCol) toGroup.push(nodes[j]);
        }

        var midY;
        if (tl.y === 0) {
            midY = (fromGroup.length > 0 ? fromGroup[0].y : 0);
        } else if (tl.y === 1) {
            var fromBottom = fromGroup.length > 0 ? fromGroup[fromGroup.length - 1].y : 0;
            var toTop = toGroup.length > 0 ? toGroup[0].y : 0;
            midY = (fromBottom + toTop) / 2;
        } else {
            var fromBottom = fromGroup.length > 0 ? fromGroup[fromGroup.length - 1].y : 0;
            midY = fromBottom + 40;
        }

        var lines = tl.label.split("\n");
        var bgW = 0;
        for (var k = 0; k < lines.length; k++) {
            var meas = ctx.measureText(lines[k]).width;
            if (meas > bgW) bgW = meas;
        }
        bgW += 16;
        var bgH = lines.length * 13 + 10;

        ctx.globalAlpha = 0.6;
        drawRoundedRect(midX - bgW / 2, midY - bgH / 2, bgW, bgH, 4);
        ctx.fillStyle = "#161b22";
        ctx.fill();
        ctx.strokeStyle = "#30363d";
        ctx.lineWidth = 0.5;
        ctx.stroke();

        ctx.globalAlpha = 0.7;
        ctx.fillStyle = "#8b949e";
        for (var k = 0; k < lines.length; k++) {
            ctx.fillText(lines[k], midX, midY + (k - (lines.length - 1) / 2) * 13);
        }
    }

    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawLink(l, connectedSet) {
    var isHighlight = l === hoverLink || (selectedNode && (l.source === selectedNode || l.target === selectedNode));
    var dimmed = selectedNode && !connectedSet[l.source.id] && !connectedSet[l.target.id];
    var op = isHighlight ? 0.95 : (dimmed ? 0.06 : (l.kind === "flow" ? 0.4 : 0.35));

    ctx.globalAlpha = op;

    var sameCol = l.source.col === l.target.col;
    var sx, sy, tx, ty;

    if (sameCol) {
        sx = l.source.x;
        sy = l.source.y + l.source.h / 2;
        tx = l.target.x;
        ty = l.target.y - l.target.h / 2;
    } else if (l.source.col < l.target.col) {
        sx = l.source.x + l.source.w / 2;
        sy = l.source.y;
        tx = l.target.x - l.target.w / 2;
        ty = l.target.y;
    } else {
        sx = l.source.x - l.source.w / 2;
        sy = l.source.y;
        tx = l.target.x + l.target.w / 2;
        ty = l.target.y;
    }

    ctx.beginPath();

    if (l.kind === "cross") {
        var dx = tx - sx;
        var dy = ty - sy;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        var cpOff = Math.min(dist * 0.3, 120);
        var cp1x, cp1y, cp2x, cp2y;

        if (sameCol) {
            cp1x = sx + cpOff;
            cp1y = sy;
            cp2x = tx + cpOff;
            cp2y = ty;
        } else {
            cp1x = sx + Math.abs(dx) * 0.3;
            cp1y = sy + dy * 0.1;
            cp2x = tx - Math.abs(dx) * 0.3;
            cp2y = ty - dy * 0.1;
        }

        ctx.moveTo(sx, sy);
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tx, ty);
        ctx.strokeStyle = isHighlight ? "#f0883e" : "#f0883e";
        ctx.lineWidth = isHighlight ? 2.5 : 1.2;
        ctx.setLineDash([6, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        var t = 0.95;
        var t2 = 0.9;
        var ex = Math.pow(1-t,3)*sx + 3*Math.pow(1-t,2)*t*cp1x + 3*(1-t)*t*t*cp2x + t*t*t*tx;
        var ey = Math.pow(1-t,3)*sy + 3*Math.pow(1-t,2)*t*cp1y + 3*(1-t)*t*t*cp2y + t*t*t*ty;
        var ex2 = Math.pow(1-t2,3)*sx + 3*Math.pow(1-t2,2)*t2*cp1x + 3*(1-t2)*t2*t2*cp2x + t2*t2*t2*tx;
        var ey2 = Math.pow(1-t2,3)*sy + 3*Math.pow(1-t2,2)*t2*cp1y + 3*(1-t2)*t2*t2*cp2y + t2*t2*t2*ty;
        var angle = Math.atan2(ey - ey2, ex - ex2);
        ctx.fillStyle = "#f0883e";
        drawArrowhead(tx, ty, angle, isHighlight ? 9 : 6);
    } else {
        if (sameCol) {
            ctx.moveTo(sx, sy);
            ctx.lineTo(tx, ty);
        } else {
            var midX = (sx + tx) / 2;
            ctx.moveTo(sx, sy);
            ctx.bezierCurveTo(midX, sy, midX, ty, tx, ty);
        }
        ctx.strokeStyle = isHighlight ? "#8b949e" : "#30363d";
        ctx.lineWidth = isHighlight ? 2.5 : 1.2;
        ctx.setLineDash([]);
        ctx.stroke();

        var angle;
        if (sameCol) {
            angle = Math.atan2(ty - sy, tx - sx);
        } else {
            angle = Math.atan2(ty - (sy + ty) / 2, tx - (sx + tx) / 2);
        }
        ctx.fillStyle = isHighlight ? "#8b949e" : "#30363d";
        drawArrowhead(tx, ty, angle, isHighlight ? 9 : 6);
    }

    ctx.globalAlpha = 1;
}

function drawNode(n, connectedSet) {
    var isHov = n === hoverNode;
    var isSel = n === selectedNode;
    var dimmed = selectedNode && !connectedSet[n.id];
    var op = dimmed ? 0.1 : 1;
    ctx.globalAlpha = op;

    var nx = n.x - n.w / 2;
    var ny = n.y - n.h / 2;

    drawRoundedRect(nx, ny, n.w, n.h, 6);
    ctx.fillStyle = hexToRgba(n.color, 0.1);
    ctx.fill();
    ctx.strokeStyle = (isHov || isSel) ? "#ffffff" : n.color;
    ctx.lineWidth = (isHov || isSel) ? 2.5 : 1.5;
    ctx.stroke();

    if (isHov || isSel) {
        ctx.shadowColor = n.color;
        ctx.shadowBlur = 12;
        drawRoundedRect(nx, ny, n.w, n.h, 6);
        ctx.strokeStyle = n.color;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    var isRoot = n.id === "question";
    var fs = isRoot ? 13 : 11;
    ctx.font = (isRoot ? "bold " : "") + fs + "px 'Segoe UI',sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#c9d1d9";

    for (var j = 0; j < n.lines.length; j++) {
        var ly = n.y + (j - (n.lines.length - 1) / 2) * (fs + 4);
        ctx.fillText(n.lines[j], n.x, ly);
    }

    ctx.globalAlpha = 1;
}

function showTooltip(item, sx, sy, isLink) {
    var tt = document.getElementById("tooltip");
    if (isLink) {
        var typeStr = item.kind === "flow" ? "FLUJO DEL CURSO" : "CONEXION CRUZADA" + (item.type ? " — " + item.type : "");
        tt.querySelector(".ttype").textContent = typeStr;
        tt.querySelector(".tlabel").textContent = item.source.label.replace(/\n/g, " ") + "  ->  " + item.target.label.replace(/\n/g, " ");
        tt.querySelector(".treason").textContent = item.reason;
    } else {
        tt.querySelector(".ttype").textContent = "NODO";
        tt.querySelector(".tlabel").textContent = item.label.replace(/\n/g, " ");
        tt.querySelector(".treason").textContent = item.desc;
    }
    tt.style.display = "block";
    var ttW = 380;
    var left = Math.min(sx + 14, W - ttW - 10);
    var top = Math.min(sy - 12, H - 120);
    if (top < 10) top = 10;
    tt.style.left = left + "px";
    tt.style.top = top + "px";
}

function hideTooltip() {
    document.getElementById("tooltip").style.display = "none";
}

function showNodeInfo(n) {
    var ni = document.getElementById("node-info");
    ni.querySelector(".ni-title").textContent = n.label.replace(/\n/g, " ");
    ni.querySelector(".ni-desc").textContent = n.desc;
    var conns = [];
    for (var i = 0; i < allLinks.length; i++) {
        var l = allLinks[i];
        if (l.source === n) conns.push("-> " + l.target.label.replace(/\n/g, " ") + ": " + l.reason);
        if (l.target === n) conns.push("<- " + l.source.label.replace(/\n/g, " ") + ": " + l.reason);
    }
    if (conns.length > 0) {
        ni.querySelector(".ni-conn").innerHTML = "<br><span>Conexiones:</span><br>" + conns.map(function(c) { return "* " + c; }).join("<br>");
    } else {
        ni.querySelector(".ni-conn").innerHTML = "";
    }
    ni.style.display = "block";
}

function hideNodeInfo() {
    document.getElementById("node-info").style.display = "none";
}

function fitView() {
    if (nodes.length === 0) return;
    var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        var l = n.x - n.w / 2 - 40;
        var r = n.x + n.w / 2 + 40;
        var t = n.y - n.h / 2 - 40;
        var b = n.y + n.h / 2 + 40;
        if (l < minX) minX = l;
        if (r > maxX) maxX = r;
        if (t < minY) minY = t;
        if (b > maxY) maxY = b;
    }
    var cw = maxX - minX;
    var ch = maxY - minY;
    var scaleX = (W - 40) / cw;
    var scaleY = (H - 80) / ch;
    camZ = Math.min(scaleX, scaleY, 1.5);
    camX = W / 2 - (minX + maxX) / 2;
    camY = H / 2 - (minY + maxY) / 2;
    draw();
}

canvas.addEventListener("wheel", function(e) {
    e.preventDefault();
    var factor = e.deltaY > 0 ? 0.92 : 1.08;
    var newZ = camZ * factor;
    if (newZ < 0.05 || newZ > 5) return;
    var wp = screenToWorld(e.offsetX, e.offsetY);
    camZ = newZ;
    var wp2 = screenToWorld(e.offsetX, e.offsetY);
    camX += wp2.x - wp.x;
    camY += wp2.y - wp.y;
    draw();
}, {passive: false});

canvas.addEventListener("mousedown", function(e) {
    isPanning = true;
    panStartX = e.offsetX;
    panStartY = e.offsetY;
    panCamX = camX;
    panCamY = camY;
    canvas.style.cursor = "grabbing";
});

canvas.addEventListener("mousemove", function(e) {
    mx = e.offsetX;
    my = e.offsetY;
    if (isPanning) {
        camX = panCamX + (mx - panStartX) / camZ;
        camY = panCamY + (my - panStartY) / camZ;
        draw();
        return;
    }
    var wp = screenToWorld(mx, my);
    var prevHoverNode = hoverNode;
    var prevHoverLink = hoverLink;
    hoverNode = hitTestNode(wp.x, wp.y);
    if (hoverNode) {
        hoverLink = null;
        canvas.style.cursor = "pointer";
        showTooltip(hoverNode, mx, my, false);
    } else {
        hoverLink = hitTestLink(wp.x, wp.y);
        if (hoverLink) {
            canvas.style.cursor = "pointer";
            showTooltip(hoverLink, mx, my, true);
        } else {
            canvas.style.cursor = "default";
            hideTooltip();
        }
    }
    if (hoverNode !== prevHoverNode || hoverLink !== prevHoverLink) {
        draw();
    }
});

canvas.addEventListener("mouseup", function(e) {
    var wasPanning = isPanning;
    var moved = Math.abs(mx - panStartX) + Math.abs(my - panStartY);
    isPanning = false;
    canvas.style.cursor = "default";

    if (wasPanning && moved > 5) return;

    var wp = screenToWorld(e.offsetX, e.offsetY);
    var n = hitTestNode(wp.x, wp.y);
    if (n) {
        if (selectedNode === n) {
            selectedNode = null;
            hideNodeInfo();
        } else {
            selectedNode = n;
            showNodeInfo(n);
        }
        draw();
    } else if (wasPanning && moved <= 5) {
        selectedNode = null;
        hideNodeInfo();
        draw();
    }
});

canvas.addEventListener("mouseleave", function() {
    hoverNode = null;
    hoverLink = null;
    hideTooltip();
    draw();
});

fitView();
draw();
</script>
</body>
</html>
