<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Mental - IA Generativa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

#node-info .ni-desc{color:#c9d1d9;margin-bottom:8px}
#node-info .ni-conn{color:#8b949e;font-size:11px}
#node-info .ni-conn span{color:#f0883e}
</style>
</head>

<div id="controls">
<button onclick="resetView()">Encajar</button>
<button onclick="setFilter('all')" id="btn-all" class="active">Todas</button>
<button onclick="setFilter('flow')" id="btn-flow">Flujo</button>
<button onclick="setFilter('cross')" id="btn-cross">Conexiones</button>
</div>
<div id="legend">

<div class="lr"><span class="ld" style="background:#58a6ff"></span> Fundamento matematico</div>
<div class="lr"><span class="ld" style="background:#7ee787"></span> Modelo generativo</div>
<div class="lr"><span class="ld" style="background:#d2a8ff"></span> Entrenamiento / Loss</div>
<div class="lr"><span class="ld" style="background:#ff7b72"></span> Evaluacion</div>
<div style="margin-top:6px;border-top:1px solid #30363d;padding-top:6px">
<div class="lr"><span style="width:24px;height:0;border-top:2px solid #555;display:inline-block"></span> Flujo (A lleva a B)</div>
<div class="lr"><span style="width:24px;height:0;border-top:2px dashed #f0883e;display:inline-block"></span> Conexion cruzada</div>
</div>
</div>

<div id="node-info"><div class="ni-title"></div><div class="ni-desc"></div><div class="ni-conn"></div></div>

<canvas id="c"></canvas>
<script>
const C={root:"#f0883e",fund:"#58a6ff",model:"#7ee787",train:"#d2a8ff",eval:"#ff7b72"};
const PI2=Math.PI*2;
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let W,H,dpr;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener("resize",()=>{resize();draw();});

const nodes=[
  {id:"question",label:"Como puede una\nmaquina CREAR?",desc:"La pregunta central del curso",color:C.root,r:30,x:W/2,y:H/2},

const flowLinks=[

const nodeMap={};
nodes.forEach((n,i)=>{
  n.vx=0;n.vy=0;
  if(!n.x){n.x=W/2+(Math.random()-0.5)*600;n.y=H/2+(Math.random()-0.5)*400;}
  nodeMap[n.id]=n;
});

const allLinks=[...flowLinks.map(l=>({...l,kind:"flow"})),...crossLinks.map(l=>({...l,kind:"cross"}))];
allLinks.forEach(l=>{l.source=nodeMap[l.s];l.target=nodeMap[l.t];});

let camX=0,camY=0,camZ=1;
let filter="all";
let dragNode=null,dragOffX=0,dragOffY=0;
let isPanning=false,panStartX=0,panStartY=0,panCamX=0,panCamY=0;
let hoverLink=null,hoverNode=null,selectedNode=null;
let mx=0,my=0;

function screenToWorld(sx,sy){return{x:(sx-W/2)/camZ+W/2-camX,y:(sy-H/2)/camZ+H/2-camY};}
function worldToScreen(wx,wy){return{x:(wx-W/2+camX)*camZ+W/2,y:(wy-H/2+camY)*camZ+H/2};}

function simulate(){
  const alpha=0.3;
  for(let i=0;i<nodes.length;i++){
    const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){
      const b=nodes[j];
      let dx=b.x-a.x,dy=b.y-a.y;
      let dist=Math.sqrt(dx*dx+dy*dy)||1;
      let minD=(a.r+b.r)*2.5;
      let force=(a.r+b.r)*180/(dist*dist);
      if(dist<minD)force+=((minD-dist)*0.5);
      a.vx-=dx/dist*force*alpha;a.vy-=dy/dist*force*alpha;
      b.vx+=dx/dist*force*alpha;b.vy+=dy/dist*force*alpha;
    }
  }
  allLinks.forEach(l=>{
    let dx=l.target.x-l.source.x,dy=l.target.y-l.source.y;
    let dist=Math.sqrt(dx*dx+dy*dy)||1;
    let ideal=l.kind==="flow"?140:280;
    let str=l.kind==="flow"?0.02:0.003;
    let force=(dist-ideal)*str*alpha;
    l.source.vx+=dx/dist*force;l.source.vy+=dy/dist*force;
    l.target.vx-=dx/dist*force;l.target.vy-=dy/dist*force;
  });
  nodes.forEach(n=>{
    n.vx+=(W/2-n.x)*0.0003;n.vy+=(H/2-n.y)*0.0003;
    if(n===dragNode)return;
    n.vx*=0.85;n.vy*=0.85;
    n.x+=n.vx;n.y+=n.vy;
  });
}

function distToSeg(px,py,ax,ay,bx,by){
  let dx=bx-ax,dy=by-ay,t=((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy);
  t=Math.max(0,Math.min(1,t));
  let cx=ax+t*dx,cy=ay+t*dy;
  return Math.sqrt((px-cx)*(px-cx)+(py-cy)*(py-cy));
}

function findHoverLink(wx,wy){
  let best=null,bestD=15/camZ;
  allLinks.forEach(l=>{
    if(filter==="flow"&&l.kind==="cross")return;
    if(filter==="cross"&&l.kind==="flow")return;
    let d=distToSeg(wx,wy,l.source.x,l.source.y,l.target.x,l.target.y);
    if(d<bestD){bestD=d;best=l;}
  });
  return best;
}

function findHoverNode(wx,wy){
  for(let i=nodes.length-1;i>=0;i--){
    let n=nodes[i];
    let dx=wx-n.x,dy=wy-n.y;
    if(dx*dx+dy*dy<(n.r+4)*(n.r+4))return n;
  }
  return null;
}

function draw(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(W/2,H/2);
  ctx.scale(camZ,camZ);
  ctx.translate(-W/2+camX,-H/2+camY);

  const connectedToSel=new Set();
  if(selectedNode){
    connectedToSel.add(selectedNode.id);
    allLinks.forEach(l=>{
      if(l.source===selectedNode)connectedToSel.add(l.target.id);
      if(l.target===selectedNode)connectedToSel.add(l.source.id);
    });
  }

  allLinks.forEach(l=>{
    if(filter==="flow"&&l.kind==="cross")return;
    if(filter==="cross"&&l.kind==="flow")return;
    let isHighlight=l===hoverLink||(selectedNode&&(l.source===selectedNode||l.target===selectedNode));
    let op=isHighlight?0.9:(selectedNode?0.06:(l.kind==="flow"?0.35:0.3));

    ctx.beginPath();
    let sx=l.source.x,sy=l.source.y,tx=l.target.x,ty=l.target.y;
    let dx=tx-sx,dy=ty-sy,dist=Math.sqrt(dx*dx+dy*dy)||1;
    let sr=l.source.r+2,tr=l.target.r+6;
    let x1=sx+dx/dist*sr,y1=sy+dy/dist*sr;
    let x2=tx-dx/dist*tr,y2=ty-dy/dist*tr;

    if(l.kind==="cross"){
      let mx2=(x1+x2)/2,my2=(y1+y2)/2;
      let off=Math.min(dist*0.15,50);
      let nx=-dy/dist*off,ny=dx/dist*off;
      ctx.moveTo(x1,y1);ctx.quadraticCurveTo(mx2+nx,my2+ny,x2,y2);
      ctx.strokeStyle=isHighlight?"#f0883e":"#f0883e";
      ctx.lineWidth=isHighlight?2.5:1.2;
      ctx.setLineDash([6,4]);
    } else {
      ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=isHighlight?"#8b949e":"#30363d";
      ctx.lineWidth=isHighlight?2.5:1.5;
      ctx.setLineDash([]);
    }
    ctx.globalAlpha=op;
    ctx.stroke();
    ctx.setLineDash([]);

    let angle=Math.atan2(y2-y1,x2-x1);
    if(l.kind==="cross"){
      let mx2=(x1+x2)/2,my2=(y1+y2)/2;
      let off=Math.min(dist*0.15,50);
      let nx=-dy/dist*off,ny=dx/dist*off;
      let t=0.95;
      let cx=mx2+nx,cy=my2+ny;
      let ex=(1-t)*(1-t)*x1+2*(1-t)*t*cx+t*t*x2;
      let ey=(1-t)*(1-t)*y1+2*(1-t)*t*cy+t*t*y2;
      let ex2=(1-0.9)*(1-0.9)*x1+2*(1-0.9)*0.9*cx+0.9*0.9*x2;
      let ey2=(1-0.9)*(1-0.9)*y1+2*(1-0.9)*0.9*cy+0.9*0.9*y2;
      angle=Math.atan2(ey-ey2,ex-ex2);
    }
    let aLen=isHighlight?10:7;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-aLen*Math.cos(angle-0.35),y2-aLen*Math.sin(angle-0.35));
    ctx.lineTo(x2-aLen*Math.cos(angle+0.35),y2-aLen*Math.sin(angle+0.35));
    ctx.closePath();
    ctx.fillStyle=l.kind==="cross"?"#f0883e":(isHighlight?"#8b949e":"#30363d");
    ctx.fill();
  });

  ctx.globalAlpha=1;

  nodes.forEach(n=>{
    let isConn=!selectedNode||connectedToSel.has(n.id);
    let isHov=n===hoverNode;
    let op=isConn?1:0.12;
    ctx.globalAlpha=op;

    ctx.beginPath();
    ctx.arc(n.x,n.y,n.r,0,PI2);
    ctx.fillStyle=n.color+"18";
    ctx.fill();
    ctx.strokeStyle=isHov||n===selectedNode?("#ffffff"):n.color;
    ctx.lineWidth=isHov||n===selectedNode?3:2;
    ctx.stroke();

    ctx.fillStyle="#c9d1d9";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    let lines=(n.label||"").split("\n");
    let fs=n.r>18?11:n.r>14?10:9;
    ctx.font=(n.r>16?"bold ":"")+fs+"px 'Segoe UI',sans-serif";
    lines.forEach((line,i)=>{
      let ly=n.y+(i-(lines.length-1)/2)*13;
      ctx.fillText(line,n.x,ly);
    });
  });

  ctx.globalAlpha=1;
  ctx.restore();
}

function showTooltip(link,sx,sy){
  const tt=document.getElementById("tooltip");
  tt.querySelector(".ttype").textContent=link.kind==="flow"?"FLUJO DEL CURSO":"CONEXION CRUZADA"+(link.type?" — "+link.type:"");
  tt.querySelector(".tlabel").textContent=(link.source.label||"").replace(/\n/g," ")+"  →  "+(link.target.label||"").replace(/\n/g," ");
  tt.querySelector(".treason").textContent=link.reason;
  tt.style.display="block";
  tt.style.left=Math.min(sx+14,W-380)+"px";
  tt.style.top=Math.min(sy-12,H-100)+"px";
}

function showNodeInfo(n){
  const ni=document.getElementById("node-info");
  ni.querySelector(".ni-title").textContent=(n.label||"").replace(/\n/g," ");
  ni.querySelector(".ni-desc").textContent=n.desc||"";
  let conns=[];
  allLinks.forEach(l=>{
    if(l.source===n) conns.push("→ "+(l.target.label||"").replace(/\n/g," ")+": "+l.reason);
    if(l.target===n) conns.push("← "+(l.source.label||"").replace(/\n/g," ")+": "+l.reason);
  });
  ni.querySelector(".ni-conn").innerHTML=conns.length?"<br><span>Conexiones:</span><br>"+conns.map(c=>"• "+c).join("<br>"):"";
  ni.style.display="block";
}

function hideNodeInfo(){document.getElementById("node-info").style.display="none";}

canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  let factor=e.deltaY>0?0.9:1.1;
  let newZ=camZ*factor;
  if(newZ<0.08||newZ>6)return;
  let wp=screenToWorld(e.offsetX,e.offsetY);
  camZ=newZ;
  let wp2=screenToWorld(e.offsetX,e.offsetY);
  camX+=wp2.x-wp.x;camY+=wp2.y-wp.y;
},{passive:false});

canvas.addEventListener("mousedown",e=>{
  let wp=screenToWorld(e.offsetX,e.offsetY);
  let n=findHoverNode(wp.x,wp.y);
  if(n){dragNode=n;dragOffX=n.x-wp.x;dragOffY=n.y-wp.y;canvas.style.cursor="grabbing";return;}
  isPanning=true;panStartX=e.offsetX;panStartY=e.offsetY;panCamX=camX;panCamY=camY;canvas.style.cursor="grabbing";
});

canvas.addEventListener("mousemove",e=>{
  mx=e.offsetX;my=e.offsetY;
  if(dragNode){
    let wp=screenToWorld(mx,my);
    dragNode.x=wp.x+dragOffX;dragNode.y=wp.y+dragOffY;
    dragNode.vx=0;dragNode.vy=0;
    return;
  }
  if(isPanning){
    camX=panCamX+(mx-panStartX)/camZ;
    camY=panCamY+(my-panStartY)/camZ;
    return;
  }
  let wp=screenToWorld(mx,my);
  let prevHoverNode=hoverNode;
  hoverNode=findHoverNode(wp.x,wp.y);
  if(hoverNode){
    canvas.style.cursor="pointer";
    hoverLink=null;
    document.getElementById("tooltip").style.display="none";
  } else {
    let hl=findHoverLink(wp.x,wp.y);
    if(hl!==hoverLink){
      hoverLink=hl;
      if(hl)showTooltip(hl,mx,my);
      else document.getElementById("tooltip").style.display="none";
    } else if(hl){
      let tt=document.getElementById("tooltip");
      tt.style.left=Math.min(mx+14,W-380)+"px";
      tt.style.top=Math.min(my-12,H-100)+"px";
    }
    canvas.style.cursor=hl?"pointer":"default";
  }
});

canvas.addEventListener("mouseup",e=>{
  if(dragNode){dragNode=null;canvas.style.cursor="default";return;}
  if(isPanning){
    let moved=Math.abs(mx-panStartX)+Math.abs(my-panStartY);
    isPanning=false;canvas.style.cursor="default";
    if(moved>5)return;
    selectedNode=null;hideNodeInfo();
    return;
  }
});

canvas.addEventListener("click",e=>{
  let wp=screenToWorld(e.offsetX,e.offsetY);
  let n=findHoverNode(wp.x,wp.y);
  if(n){
    if(selectedNode===n){selectedNode=null;hideNodeInfo();}
    else{selectedNode=n;showNodeInfo(n);}
  }
});

function setFilter(f){
  filter=f;
  document.querySelectorAll("#controls button").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+f).classList.add("active");
}

function resetView(){camX=0;camY=0;camZ=1;}

function loop(){simulate();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
